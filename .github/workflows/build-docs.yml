name: Build Documentation

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions: {}
env:
  DOCFX_PROJECT_PATH: .docfx

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-built-docs: ${{ steps.artifact-built-docs.outputs.artifact-path }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x
      - name: Install DocFX
        run: dotnet tool update -g docfx
      - name: Build documentation
        run: docfx ${{ env.DOCFX_PROJECT_PATH }}/docfx.json
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        id: artifact-built-docs
        with:
          path: ${{ env.DOCFX_PROJECT_PATH }}/_site/

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  comment-pr:
    if: github.event_name == 'pull_request'
    env:
      comment_head: "## Generated Documentation"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find Comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: ${{ env.comment_head }}
      - name: Update comment
        if: steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            ${{ env.comment_head }}
            Documentation built at commit ${{github.event.pull_request.head.sha }} is [here](${{ needs.build.outputs.artifact-built-docs }})
          reactions: hooray
      - name: Create comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ${{ env.comment_head }}
            Documentation built at commit ${{github.event.pull_request.head.sha }} is [here](${{ needs.build.outputs.artifact-built-docs }})
          reactions: rocket
